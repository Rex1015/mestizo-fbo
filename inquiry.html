<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry - Mestizo de Sangley FBO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🌿 Mestizo FBO</div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="services.html" class="nav-link">Services</a></li>
                <li><a href="inquiry.html" class="nav-link active">Inquiry</a></li>
            </ul>
        </div>
    </nav>

    <section class="inquiry-hero">
        <div class="container">
            <h1>Quick Inquiry</h1>
            <p>Get your personalized quote within 30 minutes</p>
        </div>
    </section>

    <section class="inquiry-form-section">
        <div class="container">
            <form id="inquiryForm" class="inquiry-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Aircraft Type *</label>
                        <input type="text" name="aircraft" required placeholder="e.g., Cessna Citation">
                    </div>
                    <div class="form-group">
                        <label>PAX/Crew</label>
                        <input type="number" name="pax" min="1" placeholder="e.g., 4/2">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>ETA (PH Time)</label>
                        <input type="datetime-local" name="eta">
                    </div>
                    <div class="form-group">
                        <label>Fuel Required</label>
                        <input type="number" name="fuel" placeholder="Liters">
                    </div>
                </div>

                <div class="form-group">
                    <label>Services Needed</label>
                    <select name="services" multiple style="height: 120px;">
                        <option>Fuel Services</option>
                        <option>Ramp Parking</option>
                        <option>Hangar Space</option>
                        <option>Ground Transport</option>
                        <option>Catering</option>
                        <option>Maintenance</option>
                        <option>Hotel Booking</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Special Requests</label>
                    <textarea name="requests" rows="4" placeholder="Parking preferences, catering needs..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" name="name" required>
                    </div>
                    <div class="form-group">
                        <label>Email/Phone *</label>
                        <input type="text" name="contact" required placeholder="email@domain.com or +63917...">
                    </div>
                </div>

                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>

            <div id="successMessage" class="success-message" style="display: none;">
                ✅ Thank you! Our team will respond within 30 minutes.
                <br><strong>📞 +63 917 123 4567</strong>
            </div>
        </div>
    </section>
</body>
</html>
